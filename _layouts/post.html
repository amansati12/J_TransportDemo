---
layout: default
---

<article class="post-page">
  <header class="page-hero bg-navy text-white">
    <div class="container">
      <p class="eyebrow text-warning">{{ page.date | date: "%B %d, %Y" }} · {{ page.category | default: "Transport Tips" }}</p>
      <h1>{{ page.title }}</h1>
      <p>{{ page.description }}</p>
    </div>
  </header>
  <section class="section">
    <div class="container">
      <div class="post-content mx-auto">
        {% if page.image %}
          <img class="post-featured-image" src="{{ page.image | relative_url }}" alt="{{ page.title }}">
        {% endif %}
        {{ content }}
      </div>
    </div>
  </section>
</article>
